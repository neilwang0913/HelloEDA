name: MXP Hourly Arrivals (Sunday)

on:
  schedule:
    - cron: '0 23 * * 6'
    - cron: '0 0-22 * * 0'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Fetch and append MXP arrivals
        run: python fetch_and_append.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arrivals_mxp.csv
          git diff --staged --quiet \
            && echo "No new flights this hour, skipping commit." \
            || (git commit -m "data: MXP arrivals $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
